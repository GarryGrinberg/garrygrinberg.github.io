const ZODIAC_CYCLE=['Rat','Ox','Tiger','Cat','Dragon','Snake','Horse','Goat','Monkey','Rooster','Dog','Pig'];
function getZodiac(year,month,day){
  let cny=CNY[year],chineseYear=year;
  if(cny){let cnyDate=new Date(year,cny[0]-1,cny[1]),bd=new Date(year,month-1,day);if(bd<cnyDate)chineseYear=year-1;}
  let idx=((chineseYear-1900)%12+12)%12;
  return ZODIAC_CYCLE[idx];
}

// ─── LP CALCULATION ───────────────────────────────────────────────────────────
function digitSum(n){return String(Math.abs(n)).split('').reduce((a,c)=>a+parseInt(c),0);}
function reduce(n){while(n>9&&![11,22,33].includes(n))n=digitSum(n);return n;}
function calcLP(m,d,y){
  let m1=reduce(digitSum(m)+digitSum(d)+digitSum(y));
  if(m1===2)m1=11;
  if(d>9&&![11,22].includes(d)){
    let m2=reduce(digitSum(m)+d+digitSum(y));
    if(m2===2)m2=11;
    if((m1===33&&m2===6)||(m1===6&&m2===33))return'33/6';
    if((m1===22&&m2===4)||(m1===4&&m2===22))return'22/4';
  }
  return m1;
}

// ─── DATE PARSER ─────────────────────────────────────────────────────────────
const MONTHS={jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12,january:1,february:2,march:3,april:4,june:6,july:7,august:8,september:9,october:10,november:11,december:12};
function parseDate(raw){
  if(!raw||!raw.trim())return null;
  let s=raw.trim().toLowerCase();
  s=s.replace(/(\d+)(st|nd|rd|th)/g,'$1');
  let monthFromName=null;
  for(let name in MONTHS){let re=new RegExp('\\b'+name+'\\b');if(re.test(s)){monthFromName=MONTHS[name];s=s.replace(re,' ');break;}}
  let nums=s.match(/\d+/g);
  if(!nums)return null;
  if(nums.length===1&&nums[0].length>=6){
    let n=nums[0];
    if(n.length===8){let mm=parseInt(n.slice(0,2)),dd=parseInt(n.slice(2,4)),yy=parseInt(n.slice(4,8));if(mm>12&&dd<=12){let t=mm;mm=dd;dd=t;}return valid(mm,dd,yy);}
    if(n.length===6){let a=parseInt(n.slice(0,2)),b=parseInt(n.slice(2,4)),y2=parseInt(n.slice(4,6)),yy=y2<30?2000+y2:1900+y2;if(a>=1&&a<=12&&b>=1&&b<=31)return valid(a,b,yy);if(b>=1&&b<=12&&a>=1&&a<=31)return valid(b,a,yy);}
    return null;
  }
  let year=null,rest=[];
  for(let n of nums){let v=parseInt(n);if(!year&&n.length===4&&v>=1900&&v<=2025)year=v;else rest.push(v);}
  if(!year&&rest.length>0){let last=rest[rest.length-1];if(last>=0&&last<=99){year=last<30?2000+last:1900+last;rest=rest.slice(0,-1);}}
  if(!year)return null;
  let m,d;
  if(monthFromName){m=monthFromName;d=rest[0];}
  else if(rest.length>=2){m=rest[0];d=rest[1];if(m>12&&d<=12){let t=m;m=d;d=t;}}
  else return null;
  return valid(m,d,year);
}
function valid(m,d,y){if(!m||!d||!y)return null;m=parseInt(m);d=parseInt(d);y=parseInt(y);if(m<1||m>12||d<1||d>31||y<1900||y>2025)return null;return{m,d,y};}

// ─── SYNONYM POOLS ────────────────────────────────────────────────────────────
const LP={1:['natural-born leader','unstoppable pioneer','independent force','self-made originator','dominant force'],3:['natural communicator','creative powerhouse','expressive visionary','artistic force','bold storyteller'],4:['hard-working foundation','methodical enforcer','disciplined operator','structured powerhouse','law-and-order force'],5:['freedom-loving adventurer','constant change seeker','adaptable hustler','versatile maverick','free-spirited force'],6:['natural nurturer','magnetic caretaker','compassionate protector','devoted guardian','selfless provider'],7:['deep thinker','relentless truth-seeker','analytical mind','spiritual investigator','intuitive researcher'],8:['CEO-energy powerhouse','money magnet','commanding authority','natural executive','wealth architect'],9:['relentless finisher','powerful closer','completion force','unstoppable closer','project ender'],11:['master intuitive','visionary with higher sight','spiritual powerhouse','awakened mind','elevated perceiver'],22:['master builder','empire architect','large-scale visionary','structural genius','world-shaper'],33:['master influencer','transformational force','trailblazer','world-changing presence','large-scale impact maker']};
const ZOD={Rat:['strategic intelligence','sharp mind','resourceful operator','calculated thinker','money-smart hustler'],Ox:['unstoppable determination','grounded strength','iron will','relentless grinder','immovable force'],Tiger:['bold risk-taker','fearless warrior','dominant energy','fierce competitor','powerful aggressor'],Cat:['psychological mastermind','mind game specialist','calculated observer','sharp psychologist','strategic manipulator'],Dragon:['magnetic powerhouse','commanding presence','larger-than-life energy','natural born ruler','electrifying force'],Snake:['deep wisdom','calculated intensity','magnetic mystery','strategic patience','quietly dangerous'],Horse:['stubborn powerhouse','hardworking force','relentless worker','iron-willed grinder','determined operator'],Goat:['luxury-driven powerhouse','kill-with-kindness operator','refined wealth seeker','high-taste finisher','silk-glove strategist'],Monkey:['high-IQ hands-on genius','reverse engineer','technical mastermind','problem-solving powerhouse','mechanical genius'],Rooster:['blunt and loyal force','argumentative truth-teller','direct communicator','no-filter operator','straight-shooter'],Dog:['authority challenger','sharp memory keeper','playful rebel','anti-establishment force','freedom-loving loyalist'],Pig:['over-indulgent diplomat','naturally funny connector','life-of-the-party operator','social genius','charming excess seeker']};
const ZI={Rat:'🐀',Ox:'🐂',Tiger:'🐯',Cat:'🐱',Dragon:'🐉',Snake:'🐍',Horse:'🐴',Goat:'🐐',Monkey:'🐒',Rooster:'🐓',Dog:'🐕',Pig:'🐷'};

function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}

const OPENERS=['You\'re a {lp} with {zod}','Built as a {lp} carrying {zod}','A {lp} armed with {zod}'];
const CONNECTORS=['— built to','— wired to','— designed to','— made to'];
const BUILT_FOR=['dominate through {zod} while operating as a {lp}','move through the world as a {lp} powered by {zod}','execute at the highest level — {lp} energy fused with {zod}','lead with the force of a {lp} and the edge of {zod}'];
const CLOSERS=['This blueprint has serious power and natural instincts that most people will never understand.','This blueprint operates on a different level — the combination is rare and the potential is massive.','This is not a common blueprint. The energy here is built for impact.','This blueprint hits different. The combination creates an edge that cannot be taught.','Most people will sense the energy before they understand it. This blueprint commands rooms.'];

function buildReading(lpKey,zodiac){
  const lpPool=LP[lpKey],zodPool=ZOD[zodiac];
  if(!lpPool||!zodPool)return null;
  const lp1=pick(lpPool);let lp2=pick(lpPool);while(lp2===lp1&&lpPool.length>1)lp2=pick(lpPool);
  const z1=pick(zodPool);let z2=pick(zodPool);while(z2===z1&&zodPool.length>1)z2=pick(zodPool);
  const opener=pick(OPENERS).replace('{lp}',lp1).replace('{zod}',z1);
  const conn=pick(CONNECTORS);
  const built=pick(BUILT_FOR).replace('{zod}',z2).replace('{lp}',lp2);
  const closer=pick(CLOSERS);
  return`${opener} ${conn} ${built}. ${closer}`;
}

function generate(){
  const raw=document.getElementById('rawDate').value;
  const err=document.getElementById('errMsg');
  err.classList.remove('show');
  const parsed=parseDate(raw);
  if(!parsed){err.classList.add('show');return;}
  const{m,d,y}=parsed;
  const lp=calcLP(m,d,y);
  const lpKey=typeof lp==='string'?parseInt(lp.split('/')[0]):lp;
  const zodiac=getZodiac(y,m,d);
  const reading=buildReading(lpKey,zodiac);
  if(!reading){err.classList.add('show');return;}
  document.getElementById('resultLP').textContent=`Life Path ${lp}`;
  document.getElementById('resultZodiac').textContent=zodiac;
  document.getElementById('resultZi').textContent=ZI[zodiac]||'';
  document.getElementById('readingText').textContent=reading;
  document.getElementById('inputSection').style.display='none';
  document.getElementById('result').classList.add('show');
}

function copyReading(){
  const reading=document.getElementById('readingText').textContent;
  const upsell='\n\nWant the full report? $134 at square.link/u/sHFh39O5';
  const full=reading+upsell;
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(full).then(showCopied).catch(()=>fallbackCopy(full));}
  else fallbackCopy(full);
}
function fallbackCopy(text){const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand('copy');showCopied();}catch(e){}document.body.removeChild(ta);}
function showCopied(){const msg=document.getElementById('copiedMsg');msg.style.display='block';setTimeout(()=>{msg.style.display='none';},2000);}

function reset(){
  document.getElementById('rawDate').value='';
  document.getElementById('result').classList.remove('show');
  document.getElementById('inputSection').style.display='block';
  document.getElementById('errMsg').classList.remove('show');
}

document.addEventListener('keydown',e=>{if(e.key==='Enter')generate();});
