function digitSum(n) {
  return String(Math.abs(n)).split('').reduce((a,c)=>a+parseInt(c),0);

function reduce(n) {
  while (n > 9 && ![11,22,33].includes(n)) n = digitSum(n);

  let ms = digitSum(m), ds = digitSum(d), ys = digitSum(y);

  if (d > 9 && ![11,22].includes(d)) {
    let m2 = reduce(ms + d + ys);
    if (m2 === 2) m2 = 11;
    if ((m1===33&&m2===6)||(m1===6&&m2===33)) return '33/6';

// ─── SMART DATE PARSER ───────────────────────────────────────────────────────
const MONTHS = {
  jan:1, feb:2, mar:3, apr:4, may:5, jun:6,
  jul:7, aug:8, sep:9, oct:10, nov:11, dec:12,
  january:1, february:2, march:3, april:4, june:6,
  july:7, august:8, september:9, october:10, november:11, december:12
};

function parseDate(raw) {
  if (!raw || !raw.trim()) return null;
  let s = raw.trim().toLowerCase();

  // Strip ordinals
  s = s.replace(/(\d+)(st|nd|rd|th)/g, '$1');

  // Find month name first, remove it from string
  let monthFromName = null;
  for (let name in MONTHS) {
    let re = new RegExp('\\b' + name + '\\b');
    if (re.test(s)) {
      monthFromName = MONTHS[name];
      s = s.replace(re, ' ');
      break;
    }
  }

  let nums = s.match(/\d+/g);
  if (!nums) return null;

  // Pure digit string: 09091989 or 991989
  if (nums.length === 1 && nums[0].length >= 6) {
    let n = nums[0];
    if (n.length === 8) {
      let mm = parseInt(n.slice(0,2));
      let dd = parseInt(n.slice(2,4));
      let yy = parseInt(n.slice(4,8));
      if (mm > 12 && dd <= 12) { let t=mm; mm=dd; dd=t; }
      return valid(mm, dd, yy);
    }
    if (n.length === 6) {
      let a = parseInt(n.slice(0,2));
      let b = parseInt(n.slice(2,4));
      let y2 = parseInt(n.slice(4,6));
      let yy = y2 < 30 ? 2000+y2 : 1900+y2;
      if (a >= 1 && a <= 12 && b >= 1 && b <= 31) return valid(a, b, yy);
      if (b >= 1 && b <= 12 && a >= 1 && a <= 31) return valid(b, a, yy);
    }
    return null;
  }

  // Step 1: find 4-digit year first — always takes priority
  let year = null;
  let rest = [];
  for (let n of nums) {
    let v = parseInt(n);
    if (!year && n.length === 4 && v >= 1900 && v <= 2025) {
      year = v;
    } else {
      rest.push(v);
    }
  }

  // Step 2: if no 4-digit year, look for 2-digit year at end
  if (!year && rest.length > 0) {
    let last = rest[rest.length - 1];
    if (last >= 0 && last <= 99) {
      year = last < 30 ? 2000 + last : 1900 + last;
      rest = rest.slice(0, -1);
    }
  }

  if (!year) return null;

  // Step 3: determine month and day from rest
  let m, d;
  if (monthFromName) {
    m = monthFromName;
    d = rest[0];
  } else if (rest.length >= 2) {
    m = rest[0]; d = rest[1];
    if (m > 12 && d <= 12) { let t=m; m=d; d=t; }
  } else {
    return null;
  }

  return valid(m, d, year);
}

function valid(m, d, y) {
  if (!m||!d||!y) return null;
  m=parseInt(m); d=parseInt(d); y=parseInt(y);
  if (m<1||m>12||d<1||d>31||y<1900||y>2025) return null;
  return {m, d, y};
}

// ─── MAIN FUNCTION ────────────────────────────────────────────────────────────
function generate() {
  const raw = document.getElementById('rawDate').value;
  const err = document.getElementById('errMsg');
  err.classList.remove('show');

  const parsed = parseDate(raw);
  if (!parsed) { err.classList.add('show'); return; }

  const {m, d, y} = parsed;
  const lp = calcLP(m, d, y);
  const lpKey = typeof lp === 'string' ? parseInt(lp.split('/')[0]) : lp;
  const zodiac = getZodiac(y, m, d);
  const reading = buildReading(lpKey, zodiac);

  if (!reading) { err.classList.add('show'); return; }

  document.getElementById('resultLP').textContent = `Life Path ${lp}`;
  document.getElementById('resultZodiac').textContent = zodiac;
  document.getElementById('resultZi').textContent = ZI[zodiac] || '';
  document.getElementById('readingText').textContent = reading;

  document.getElementById('inputSection').style.display = 'none';
  const res = document.getElementById('result');
  res.classList.add('show');
}

function reset() {
  document.getElementById('rawDate').value = '';
  document.getElementById('result').classList.remove('show');
  document.getElementById('inputSection').style.display = 'block';
  document.getElementById('errMsg').classList.remove('show');
}

document.addEventListener('keydown', e => { if (e.key==='Enter') generate(); });
</script>
</body>
</html>
